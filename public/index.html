<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9t9glow - 100 Numbers Jackpot</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: #1c2128; padding: 20px; border-radius: 15px; border: 1px solid #30363d; max-width: 450px; margin: auto; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        /* 🏆 TOP WINNER HIGHLIGHT */
        #top-winner-announcement { background: linear-gradient(90deg, #f2a900, #ffcc00); color: black; padding: 12px; font-weight: bold; border-radius: 10px; margin-bottom: 15px; display: none; font-size: 14px; box-shadow: 0 0 15px #f2a900; }

        #timer { font-size: 65px; font-weight: bold; color: #f2a900; text-shadow: 0 0 20px rgba(242, 169, 0, 0.5); }
        
        /* 🎰 1-100 GRID */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 15px; max-height: 280px; overflow-y: auto; padding: 10px; background: #0d1117; border-radius: 10px; border: 1px solid #30363d; }
        .num-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 12px 0; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .num-btn:hover:not(:disabled) { border-color: #f2a900; background: #30363d; }
        .num-btn.selected { background: #f2a900 !important; color: black !important; transform: scale(1.05); }
        .num-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .stats-bar { display: flex; justify-content: space-between; font-size: 13px; opacity: 0.8; margin-bottom: 10px; color: #8b949e; }
        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: flex; align-items: center; justify-content: center; z-index: 999; display: none; }
        .result-box { background: #f2a900; color: black; padding: 35px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; }
        .hidden { display: none; }
        .btn-main { background: white; color: black; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-container" class="card">
        <h1 style="color:#f2a900; font-size: 45px; margin: 10px 0;">9t9glow</h1>
        <p style="opacity:0.7;">Sundernagar's Ultimate Jackpot</p>
        <button class="btn-main" onclick="googleLogin()">Sign in with Google</button>
    </div>

    <div id="game-container" class="card hidden">
        <div id="top-winner-announcement">🔥 LAST WINNER: <span id="last-winner-name">None</span></div>

        <div class="stats-bar">
            <span>👥 Online: <span id="online-count">0</span></span>
            <span>🎟️ Bets: <span id="bet-count">0</span></span>
        </div>

        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="display:flex; align-items:center; gap:8px;">
                <img id="user-photo" src="" width="35" style="border-radius:50%; border: 1px solid #f2a900;">
                <span id="user-name" style="font-weight:bold; font-size:14px;">Player</span>
            </div>
            <div style="color:#44ff44; font-weight:bold; font-size:18px;"><span id="wallet-balance">1000</span> Coins</div>
        </div>

        <div id="timer">01:00</div>
        <p id="status" style="color:#f2a900; font-weight:bold;">Pick your lucky number!</p>

        <div class="grid-container" id="numbers-grid"></div>
        <button onclick="logout()" style="margin-top:20px; color:#ff4444; background:none; border:none; cursor:pointer; font-size:12px;">Logout System</button>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <h2 id="result-title" style="margin:0;">WINNING NUMBER</h2>
            <h1 id="winning-num-display" style="font-size: 90px; margin: 10px 0;">--</h1>
            <p id="result-msg" style="font-weight:bold; font-size:20px;"></p>
            <p id="all-winners" style="font-size:13px; margin-top:10px; color: #333;"></p>
            <button onclick="closeResult()" class="btn-main" style="background:black; color:white;">Play Next Round</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 🔑 TERI ASLI API KEY (Vlz wala correct)
        const firebaseConfig = {
            apiKey: "AIzaSyDvM9pcjS6K60tdA_xVlzVCTt7eZPQzEsw",
            authDomain: "t9glow-6badf.firebaseapp.com",
            projectId: "t9glow-6badf",
            storageBucket: "t9glow-6badf.firebasestorage.app",
            messagingSenderId: "607215632215",
            appId: "1:607215632215:web:d88b169eaa59a57644c812"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const socket = io();
        let selectedNum = null;
        let wallet = 1000;
        let myName = "";

        window.googleLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);
        window.closeResult = () => document.getElementById('result-overlay').style.display = 'none';

        // 🎰 1-100 Buttons Generation
        const grid = document.getElementById('numbers-grid');
        for(let i=1; i<=100; i++){
            const b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = i;
            b.onclick = () => {
                document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
                selectedNum = i;
                socket.emit('placeBet', { name: myName, number: i });
            };
            grid.appendChild(b);
        }

        // Multiplayer Updates
        socket.on('playerCount', count => document.getElementById('online-count').innerText = count);
        socket.on('updateLiveBets', count => document.getElementById('bet-count').innerText = count);

        // Timer Sync
        socket.on('timer', (sec) => {
            document.getElementById('timer').innerText = `00:${sec.toString().padStart(2,'0')}`;
            if(sec <= 10) {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = true);
                document.getElementById('status').innerText = "🔒 Betting Closed";
                document.getElementById('status').style.color = "#ff4444";
            } else {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = false);
                document.getElementById('status').innerText = "Pick your lucky number!";
                document.getElementById('status').style.color = "#f2a900";
            }
        });

        // Game Result Logic
        socket.on('gameResult', (data) => {
            document.getElementById('result-overlay').style.display = 'flex';
            document.getElementById('winning-num-display').innerText = data.number;
            document.getElementById('bet-count').innerText = "0";

            if(data.winners.length > 0) {
                document.getElementById('top-winner-announcement').style.display = 'block';
                document.getElementById('last-winner-name').innerText = data.winners[0].split(' ')[0] + (data.winners.length > 1 ? ` & ${data.winners.length-1} more` : "");
                document.getElementById('all-winners').innerText = "Champions: " + data.winners.join(", ");
            }

            if(selectedNum == data.number) {
                document.getElementById('result-title').innerText = "🏆 WINNER!";
                document.getElementById('result-msg').innerText = "You won 500 Coins!";
                wallet += 500;
                document.getElementById('wallet-balance').innerText = wallet;
            } else {
                document.getElementById('result-title').innerText = "💔 LOST";
                document.getElementById('result-msg').innerText = "Better luck next time, Bhai!";
            }
            selectedNum = null;
            document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('selected'));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                myName = user.displayName;
            } else {
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('game-container').classList.add('hidden');
            }
        });
    </script>
</body>
</html>

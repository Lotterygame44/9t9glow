<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9t9glow - Professional Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0c29; color: white; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 320px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); }
        .google-btn { background: white; color: #444; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; transition: 0.3s; }
        .google-btn:hover { background: #f1f1f1; transform: scale(1.02); }
        .hidden { display: none; }
        #user-photo { border-radius: 50%; margin-bottom: 10px; border: 2px solid #ff9800; }
    </style>
</head>
<body>

    <div id="login-container" class="card">
        <h1 style="color: #ff9800; margin-bottom: 10px;">9t9glow</h1>
        <p style="opacity: 0.8;">Welcome to the Jackpot Arena</p>
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Continue with Google
        </button>
    </div>

    <div id="game-container" class="card hidden">
        <img id="user-photo" src="" width="60">
        <h2>Hi, <span id="user-name"></span>!</h2>
        <div style="font-size: 24px; color: #ff9800; margin: 20px 0;">Wallet: ₹1000</div>
        <button onclick="logout()" style="background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px;">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDvM9pcjS6K60tdA_xVlzVCTt7eZPZzEsw",
          authDomain: "t9glow-6badf.firebaseapp.com",
          projectId: "t9glow-6badf",
          storageBucket: "t9glow-6badf.firebasestorage.app",
          messagingSenderId: "607215632215",
          appId: "1:607215632215:web:d88b169eaa59a57644c812",
          measurementId: "G-061RGH339W"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        window.googleLogin = function() {
            signInWithPopup(auth, provider).catch((error) => {
                alert("Login Error: " + error.message);
            });
        };

        window.logout = function() { signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
            } else {
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('game-container').classList.add('hidden');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9t9glow - Pro 6-Pick</title>
    <style>
        :root { --gold: #f2a900; --green: #44ff44; --red: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: #1c2128; padding: 15px; border-radius: 15px; border: 1px solid #30363d; max-width: 450px; margin: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        #timer { font-size: 50px; font-weight: bold; color: var(--gold); margin: 5px 0; }
        .online-box { background: #0d1117; padding: 8px; border-radius: 8px; font-size: 11px; margin-bottom: 10px; text-align: left; border: 1px solid #333; max-height: 60px; overflow-y: auto; }
        .player-tag { display: inline-block; background: #21262d; padding: 2px 6px; border-radius: 5px; margin: 2px; color: var(--green); font-size: 10px; border: 1px solid #333; }

        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #0d1117; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .num-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 12px 0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .num-btn.selected { background: var(--gold) !important; color: black !important; transform: scale(1.05); border-color: white; }
        .num-btn:disabled { opacity: 0.3; }

        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-auto { background: #3333ff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-confirm { background: var(--green); color: black; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 2; font-size: 16px; }
        .btn-confirm:disabled { background: #444; color: #888; }

        .selection-box { background: rgba(242, 169, 0, 0.05); border: 1px dashed var(--gold); padding: 10px; border-radius: 10px; margin-top: 15px; }
        .sel-num { display: inline-block; width: 30px; height: 30px; line-height: 30px; background: var(--gold); color: black; border-radius: 50%; font-weight: bold; margin: 0 4px; font-size: 13px; }

        /* 🏆 RESULT & ANIMATIONS */
        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
        .result-box { background: var(--gold); color: black; padding: 20px; border-radius: 20px; width: 90%; max-width: 360px; text-align: center; position: relative; overflow: hidden; }
        
        .winner-list { background: rgba(0,0,0,0.1); border-radius: 10px; padding: 10px; margin-top: 15px; text-align: left; max-height: 120px; overflow-y: auto; font-size: 12px; }
        .win-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }

        /* 🔥 JACKPOT SHAKE ANIMATION */
        .jackpot-anim { animation: shake 0.2s infinite, glow 0.5s infinite alternate; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, 1px) rotate(0deg); } }
        @keyframes glow { from { box-shadow: 0 0 20px gold; } to { box-shadow: 0 0 60px orange; } }

        .hidden { display: none !important; }
        .lucky-ball { background: black; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; display: inline-flex; margin: 4px; }
    </style>
</head>
<body>

    <div id="login-container" class="card">
        <h1 style="color:var(--gold); font-size: 40px;">9t9glow</h1>
        <button onclick="googleLogin()" style="padding:15px; width:100%; font-weight:bold; border-radius:10px; cursor:pointer;">Sign in with Google</button>
    </div>

    <div id="game-container" class="card hidden">
        <div class="online-box">
            <span style="color:#8b949e;">Online Players:</span>
            <div id="user-list-display"></div>
        </div>

        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div style="display:flex; align-items:center; gap:8px;">
                <img id="user-photo" src="" width="30" style="border-radius:50%; border: 1px solid var(--gold);">
                <span id="user-name" style="font-weight:bold; font-size: 12px;"></span>
            </div>
            <div style="color:var(--green); font-weight:bold;"><span id="wallet-balance">--</span> Coins</div>
        </div>

        <div id="timer">00:00</div>

        <div class="grid-container" id="numbers-grid"></div>

        <div class="selection-box">
            <div id="my-selection-display" style="font-weight: bold;"><span style="color:#666;">No Picks</span></div>
        </div>

        <div class="controls">
            <button class="btn-auto" onclick="autoPick()">Auto Pick 🪄</button>
            <button id="confirm-bet-btn" class="btn-confirm" onclick="placeTicket()" disabled>Confirm (10)</button>
        </div>
        
        <button onclick="logout()" style="margin-top:15px; color:var(--red); background:none; border:none; cursor:pointer; font-size:11px; opacity:0.6;">Logout</button>
    </div>

    <div id="result-overlay">
        <div class="result-box" id="res-box">
            <h2 id="jackpot-tag" class="hidden" style="color:red; margin:0;">🔥 JACKPOT 8000! 🔥</h2>
            <h3 style="margin:5px 0;">WINNING NUMBERS</h3>
            <div id="winning-nums-display"></div>
            <h1 id="result-title" style="margin: 10px 0;">--</h1>
            
            <div class="winner-list" id="winners-scroll">
                <div style="font-weight:bold; text-align:center; margin-bottom:5px;">ROUND RESULTS</div>
                <div id="full-list-content"></div>
            </div>

            <button onclick="closeResult()" style="background:black; color:white; border:none; padding:12px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:15px;">Next Round</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvM9pcjS6K60tdA_xVlzVCTt7eZPQzEsw",
            authDomain: "t9glow-6badf.firebaseapp.com",
            projectId: "t9glow-6badf",
            storageBucket: "t9glow-6badf.firebasestorage.app",
            messagingSenderId: "607215632215",
            appId: "1:607215632215:web:d88b169eaa59a57644c812"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const socket = io();
        
        let wallet = 1000;
        let selectedNums = [];
        let myName = "";
        let betPlaced = false;
        let myUID = "";

        window.googleLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);
        window.closeResult = () => document.getElementById('result-overlay').style.display = 'none';

        // 🪄 AUTOPICK LOGIC
        window.autoPick = () => {
            if(betPlaced) return;
            selectedNums = [];
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            while(selectedNums.length < 6) {
                let r = Math.floor(Math.random() * 25) + 1;
                if(!selectedNums.includes(r)) selectedNums.push(r);
            }
            selectedNums.forEach(n => {
                const btn = document.querySelector(`.num-btn[data-num="${n}"]`);
                if(btn) btn.classList.add('selected');
            });
            updateSelectionUI();
        };

        const grid = document.getElementById('numbers-grid');
        for(let i=1; i<=25; i++){
            const b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = i;
            b.setAttribute('data-num', i);
            b.onclick = () => {
                if(betPlaced) return;
                if(selectedNums.includes(i)) {
                    selectedNums = selectedNums.filter(n => n !== i);
                    b.classList.remove('selected');
                } else if(selectedNums.length < 6) {
                    selectedNums.push(i);
                    b.classList.add('selected');
                }
                updateSelectionUI();
            };
            grid.appendChild(b);
        }

        function updateSelectionUI() {
            const display = document.getElementById('my-selection-display');
            if(selectedNums.length === 0) display.innerHTML = '<span style="color:#666;">No Picks</span>';
            else display.innerHTML = selectedNums.sort((a,b)=>a-b).map(n => `<span class="sel-num">${n}</span>`).join('');
            document.getElementById('confirm-bet-btn').disabled = (selectedNums.length !== 6);
        }

        window.placeTicket = () => {
            if(wallet < 10) return alert("No Coins!");
            saveWallet(wallet - 10);
            betPlaced = true;
            document.getElementById('confirm-bet-btn').disabled = true;
            document.getElementById('confirm-bet-btn').innerText = "✅ CONFIRMED";
            socket.emit('placeBet', { name: myName, numbers: selectedNums });
        };

        function saveWallet(amount) {
            wallet = amount;
            document.getElementById('wallet-balance').innerText = wallet;
            if(myUID) localStorage.setItem('9t9wallet_' + myUID, wallet);
        }

        socket.on('updateUserList', (users) => {
            document.getElementById('user-list-display').innerHTML = [...new Set(users)].map(u => `<span class="player-tag">${u.split(' ')[0]}</span>`).join('');
        });

        socket.on('timer', (sec) => {
            document.getElementById('timer').innerText = `00:${sec.toString().padStart(2,'0')}`;
            if(sec <= 10) {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = true);
                document.getElementById('confirm-bet-btn').disabled = true;
            } else if(!betPlaced) {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = false);
            }
        });

        socket.on('gameResult', (data) => {
            const overlay = document.getElementById('result-overlay');
            const resBox = document.getElementById('res-box');
            const listContent = document.getElementById('full-list-content');
            overlay.style.display = 'flex';
            
            // Winning balls
            document.getElementById('winning-nums-display').innerHTML = data.winningNumbers.map(n => `<div class="lucky-ball">${n}</div>`).join('');

            // My Results
            const matches = selectedNums.filter(n => data.winningNumbers.includes(n)).length;
            let prize = 0;
            if(matches === 3) prize = 30;
            else if(matches === 4) prize = 125;
            else if(matches === 5) prize = 2500;
            else if(matches === 6) prize = 8000;

            if(betPlaced && prize > 0) {
                saveWallet(wallet + prize);
                document.getElementById('result-title').innerText = `WINNER! (+${prize})`;
            } else {
                document.getElementById('result-title').innerText = betPlaced ? `MATCHED ${matches}` : "ROUND OVER";
            }

            // 🔥 6/6 JACKPOT ANIMATION
            if(matches === 6) {
                resBox.classList.add('jackpot-anim');
                document.getElementById('jackpot-tag').classList.remove('hidden');
            } else {
                resBox.classList.remove('jackpot-anim');
                document.getElementById('jackpot-tag').classList.add('hidden');
            }

            // 📊 FULL LIST (Who won/lost)
            listContent.innerHTML = data.allResults.sort((a,b)=>b.matches - a.matches).map(res => `
                <div class="win-item">
                    <span>${res.name.split(' ')[0]}</span>
                    <span style="color:${res.matches >= 3 ? 'green' : 'black'}">${res.matches} Match</span>
                </div>
            `).join('') || '<div style="text-align:center">No one played</div>';

            // Reset UI
            betPlaced = false;
            selectedNums = [];
            updateSelectionUI();
            document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('confirm-bet-btn').innerText = "Confirm (10)";
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUID = user.uid;
                myName = user.displayName;
                // Persistent Wallet Check
                const saved = localStorage.getItem('9t9wallet_' + myUID);
                wallet = saved ? parseInt(saved) : 1000;
                
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                document.getElementById('user-name').innerText = myName;
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('wallet-balance').innerText = wallet;
                socket.emit('joinGame', myName);
            } else {
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('game-container').classList.add('hidden');
            }
        });
    </script>
</body>
</html>

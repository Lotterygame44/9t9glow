<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9t9glow - Pro Arena</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: #1c2128; padding: 20px; border-radius: 15px; border: 1px solid #30363d; max-width: 450px; margin: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; }
        
        #winner-banner { background: linear-gradient(90deg, #ff00cc, #3333ff); color: white; padding: 10px; font-weight: bold; border-radius: 10px; margin-bottom: 15px; display: none; animation: slideDown 0.5s ease-out; border: 2px solid gold; font-size: 14px; }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #timer { font-size: 60px; font-weight: bold; color: #f2a900; margin: 5px 0; }
        .online-box { background: #0d1117; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; text-align: left; border: 1px solid #333; max-height: 70px; overflow-y: auto; }
        .player-tag { display: inline-block; background: #21262d; padding: 2px 8px; border-radius: 10px; margin: 2px; color: #44ff44; border: 1px solid #30363d; }

        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; background: #0d1117; padding: 10px; border-radius: 10px; }
        .num-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 15px 0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; }
        .num-btn.selected { background: #f2a900 !important; color: black !important; border-color: white; transform: scale(1.05); }
        .num-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .selection-box { background: rgba(242, 169, 0, 0.1); border: 1px dashed #f2a900; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .sel-num { display: inline-block; width: 35px; height: 35px; line-height: 35px; background: #f2a900; color: black; border-radius: 50%; font-weight: bold; margin: 0 5px; }

        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
        .result-box { background: #f2a900; color: black; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; }
        .lucky-ball { background: black; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; display: inline-flex; margin: 5px; font-size: 18px; }
        
        .btn-confirm { background: #44ff44; color: black; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-container" class="card">
        <h1 style="color:#f2a900; font-size: 40px; margin-bottom: 10px;">9t9glow</h1>
        <p style="opacity:0.8; margin-bottom: 20px;">Elite Multi-Pick Jackpot</p>
        <button onclick="googleLogin()" style="padding:15px; width:100%; cursor:pointer; font-weight:bold; border-radius:10px; border:none; background:white; color:black; font-size: 16px;">Sign in with Google</button>
    </div>

    <div id="game-container" class="card hidden">
        <div id="winner-banner">🎊 WINNER: <span id="banner-name">None</span> (8000 Coins) 🎊</div>

        <div class="online-box">
            <div style="color:#8b949e; margin-bottom: 5px;">Online Now:</div>
            <div id="user-list-display"></div>
        </div>

        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div style="display:flex; align-items:center; gap:8px;">
                <img id="user-photo" src="" width="30" style="border-radius:50%; border: 1px solid #f2a900;">
                <span id="user-name" style="font-weight:bold; font-size: 13px;"></span>
            </div>
            <div style="color:#44ff44; font-weight:bold;"><span id="wallet-balance">1000</span> Coins</div>
        </div>

        <div id="timer">00:00</div>

        <div class="grid-container" id="numbers-grid"></div>

        <div class="selection-box">
            <div style="font-size:14px; margin-bottom:8px; font-weight: bold; color: #f2a900;">Your 6 Picks:</div>
            <div id="my-selection-display"><span style="color:#666;">No numbers selected</span></div>
        </div>

        <button id="confirm-bet-btn" class="btn-confirm" onclick="placeTicket()" disabled>Confirm Ticket (10 Coins)</button>
        <button onclick="logout()" style="margin-top:20px; color:#ff4444; background:none; border:none; cursor:pointer; font-size:12px; opacity: 0.6;">Logout</button>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <h2 style="margin:0;">LUCKY NUMBERS</h2>
            <div id="winning-nums-display" style="margin: 20px 0;"></div>
            <h1 id="result-title" style="font-size: 32px; margin: 10px 0;">--</h1>
            <p id="result-msg" style="font-weight:bold; font-size:18px;"></p>
            <button onclick="closeResult()" style="background:black; color:white; border:none; padding:12px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer; margin-top: 15px;">Play Next Round</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvM9pcjS6K60tdA_xVlzVCTt7eZPQzEsw",
            authDomain: "t9glow-6badf.firebaseapp.com",
            projectId: "t9glow-6badf",
            storageBucket: "t9glow-6badf.firebasestorage.app",
            messagingSenderId: "607215632215",
            appId: "1:607215632215:web:d88b169eaa59a57644c812"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const socket = io();
        
        let wallet = parseInt(localStorage.getItem('9t9wallet')) || 1000;
        let selectedNums = [];
        let myName = "";
        let betPlaced = false;

        window.googleLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => { localStorage.removeItem('9t9wallet'); signOut(auth).then(()=>location.reload()); };
        window.closeResult = () => document.getElementById('result-overlay').style.display = 'none';

        function updateWallet(amount) {
            wallet = amount;
            document.getElementById('wallet-balance').innerText = wallet;
            localStorage.setItem('9t9wallet', wallet);
        }

        // 🔥 FIX: Grid ko generate karne se pehle saaf karna
        const grid = document.getElementById('numbers-grid');
        grid.innerHTML = ''; 
        for(let i=1; i<=25; i++){
            const b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = i;
            b.onclick = () => {
                if(betPlaced) return;
                if(selectedNums.includes(i)) {
                    selectedNums = selectedNums.filter(n => n !== i);
                    b.classList.remove('selected');
                } else if(selectedNums.length < 6) {
                    selectedNums.push(i);
                    b.classList.add('selected');
                }
                updateSelectionUI();
            };
            grid.appendChild(b);
        }

        function updateSelectionUI() {
            const display = document.getElementById('my-selection-display');
            if(selectedNums.length === 0) {
                display.innerHTML = '<span style="color:#666;">No numbers selected</span>';
            } else {
                display.innerHTML = selectedNums.sort((a,b)=>a-b).map(n => `<span class="sel-num">${n}</span>`).join('');
            }
            document.getElementById('confirm-bet-btn').disabled = (selectedNums.length !== 6);
        }

        window.placeTicket = () => {
            if(wallet < 10) return alert("Not enough coins!");
            updateWallet(wallet - 10);
            betPlaced = true;
            document.getElementById('confirm-bet-btn').disabled = true;
            document.getElementById('confirm-bet-btn').innerText = "✅ TICKET CONFIRMED";
            socket.emit('placeBet', { name: myName, numbers: selectedNums });
        };

        socket.on('updateUserList', (users) => {
            const listDiv = document.getElementById('user-list-display');
            listDiv.innerHTML = [...new Set(users)].map(u => `<span class="player-tag">${u.split(' ')[0]}</span>`).join('');
        });

        socket.on('timer', (sec) => {
            document.getElementById('timer').innerText = `00:${sec.toString().padStart(2,'0')}`;
            if(sec <= 10) {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = true);
                document.getElementById('confirm-bet-btn').disabled = true;
            } else if(!betPlaced) {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = false);
            }
        });

        socket.on('gameResult', (data) => {
            document.getElementById('result-overlay').style.display = 'flex';
            const numsDisp = document.getElementById('winning-nums-display');
            numsDisp.innerHTML = data.winningNumbers.map(n => `<div class="lucky-ball">${n}</div>`).join('');

            const matches = selectedNums.filter(n => data.winningNumbers.includes(n)).length;
            let prize = 0;
            if(matches === 3) prize = 30;
            else if(matches === 4) prize = 125;
            else if(matches === 5) prize = 2500;
            else if(matches === 6) prize = 8000;

            if(betPlaced && prize > 0) {
                document.getElementById('result-title').innerText = "🏆 WINNER!";
                document.getElementById('result-msg').innerText = `${matches} Matches: +${prize} Coins!`;
                updateWallet(wallet + prize);
            } else {
                document.getElementById('result-title').innerText = matches >= 3 ? "🏆 CHAMPIONS!" : "💔 NO LUCK";
                document.getElementById('result-msg').innerText = betPlaced ? `Matched: ${matches} (Min 3 needed)` : "Wait for next round...";
            }

            if(data.winners.length > 0) {
                const banner = document.getElementById('winner-banner');
                banner.style.display = 'block';
                document.getElementById('banner-name').innerText = data.winners[0].name.split(' ')[0];
                setTimeout(() => banner.style.display = 'none', 10000);
            }

            betPlaced = false;
            selectedNums = [];
            updateSelectionUI();
            document.querySelectorAll('.num-btn').forEach(btn => {
                btn.classList.remove('selected');
                btn.disabled = false;
            });
            document.getElementById('confirm-bet-btn').innerText = "Confirm Ticket (10 Coins)";
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('wallet-balance').innerText = wallet;
                myName = user.displayName;
                socket.emit('joinGame', myName);
            } else {
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('game-container').classList.add('hidden');
            }
        });
    </script>
</body>
</html>

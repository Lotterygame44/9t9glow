<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9t9glow - Pro Jackpot</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: #1c2128; padding: 20px; border-radius: 15px; border: 1px solid #30363d; max-width: 450px; margin: auto; }
        #timer { font-size: 60px; font-weight: bold; color: #f2a900; }
        
        /* 🎰 1-100 GRID */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding: 10px; background: #0d1117; border-radius: 10px; }
        .num-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 10px 0; border-radius: 5px; cursor: pointer; }
        .num-btn.selected { background: #f2a900; color: black; font-weight: bold; }

        /* 🏆 RESULT POPUP */
        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
        .result-box { background: #f2a900; color: black; padding: 40px; border-radius: 20px; width: 80%; max-width: 300px; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-container" class="card">
        <h1>9t9glow</h1>
        <button onclick="googleLogin()" style="padding:15px; width:100%; cursor:pointer;">Sign in with Google</button>
    </div>

    <div id="game-container" class="card hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span id="user-name">Player</span>
            <span style="color:#44ff44;">Wallet: ₹<span id="wallet-balance">1000</span></span>
        </div>

        <div id="timer">03:00</div>
        <p id="status">Pick your lucky number!</p>

        <div class="grid-container" id="numbers-grid"></div>
        <button onclick="logout()" style="margin-top:20px; color:red; background:none; border:none; cursor:pointer;">Logout</button>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <h2 id="result-title">WINNER!</h2>
            <h1 id="winning-num-display" style="font-size: 80px; margin: 10px 0;">--</h1>
            <p id="result-msg">Loading results...</p>
            <button onclick="closeResult()" style="padding:10px 20px; cursor:pointer; font-weight:bold;">Next Round</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvM9pcjS6K60tdA_xVlzVCTt7eZPQzEsw", // Teri sahi key
            authDomain: "t9glow-6badf.firebaseapp.com",
            projectId: "t9glow-6badf",
            storageBucket: "t9glow-6badf.firebasestorage.app",
            messagingSenderId: "607215632215",
            appId: "1:607215632215:web:d88b169eaa59a57644c812"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const socket = io();
        let selectedNum = null;
        let wallet = 1000;

        window.googleLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);
        window.closeResult = () => document.getElementById('result-overlay').style.display = 'none';

        // 🎰 Grid Generate Karo
        const grid = document.getElementById('numbers-grid');
        for(let i=1; i<=100; i++){
            const b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = i;
            b.onclick = () => {
                document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
                selectedNum = i;
            };
            grid.appendChild(b);
        }

        // 🕒 Timer & Results
        socket.on('timer', (sec) => {
            let m = Math.floor(sec/60);
            let s = sec%60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(sec <= 10) {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = true);
                document.getElementById('status').innerText = "Betting Closed! Waiting for Result...";
            } else {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = false);
            }
        });

        socket.on('gameResult', (data) => {
            const overlay = document.getElementById('result-overlay');
            const winNumDisp = document.getElementById('winning-num-display');
            const resTitle = document.getElementById('result-title');
            const resMsg = document.getElementById('result-msg');

            overlay.style.display = 'flex';
            winNumDisp.innerText = data.number;

            if(selectedNum == data.number) {
                resTitle.innerText = "CHAMPION!";
                resMsg.innerText = "Congratulations! 100 coins added to your wallet.";
                wallet += 100;
                document.getElementById('wallet-balance').innerText = wallet;
            } else {
                resTitle.innerText = "LOST!";
                resMsg.innerText = "Better luck next time, Bhai!";
            }
            selectedNum = null; // Reset for next round
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
            } else {
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('game-container').classList.add('hidden');
            }
        });
    </script>
</body>
</html>

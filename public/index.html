<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9t9glow - Elite 6-Pick Jackpot</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: #1c2128; padding: 20px; border-radius: 15px; border: 1px solid #30363d; max-width: 450px; margin: auto; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        #top-winner-announcement { background: linear-gradient(90deg, #f2a900, #ffcc00); color: black; padding: 10px; font-weight: bold; border-radius: 10px; margin-bottom: 15px; display: none; font-size: 13px; }
        #timer { font-size: 60px; font-weight: bold; color: #f2a900; }
        
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; padding: 10px; background: #0d1117; border-radius: 10px; }
        .num-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 15px 0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s; }
        .num-btn.selected { background: #f2a900 !important; color: black !important; border-color: white; transform: scale(1.05); }
        .num-btn:disabled { opacity: 0.3; }

        .stats-bar { display: flex; justify-content: space-between; font-size: 13px; opacity: 0.8; margin-bottom: 10px; color: #8b949e; }
        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; z-index: 999; display: none; }
        .result-box { background: #f2a900; color: black; padding: 25px; border-radius: 25px; width: 90%; max-width: 350px; }
        
        .lucky-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        .lucky-ball { background: black; color: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }

        .hidden { display: none; }
        .btn-main { background: white; color: black; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-container" class="card">
        <h1 style="color:#f2a900; font-size: 40px; margin: 10px 0;">9t9glow</h1>
        <p style="opacity:0.7;">Select 6 Numbers & Win 500 Coins!</p>
        <button class="btn-main" onclick="googleLogin()">Sign in with Google</button>
    </div>

    <div id="game-container" class="card hidden">
        <div id="top-winner-announcement">🏆 LAST WINNER: <span id="last-winner-name">None</span></div>

        <div class="stats-bar">
            <span>👥 Online: <span id="online-count">0</span></span>
            <span>🎟️ Players Betting: <span id="bet-count">0</span></span>
        </div>

        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="display:flex; align-items:center; gap:8px;">
                <img id="user-photo" src="" width="30" style="border-radius:50%; border: 1px solid #f2a900;">
                <span id="user-name" style="font-size:12px;"></span>
            </div>
            <div style="color:#44ff44; font-weight:bold;"><span id="wallet-balance">1000</span> Coins</div>
        </div>

        <div id="timer">01:00</div>
        <p id="status" style="color:#f2a900; font-weight:bold;">Pick exactly 6 numbers!</p>

        <div class="grid-container" id="numbers-grid"></div>
        <button onclick="logout()" style="margin-top:20px; color:#ff4444; background:none; border:none; cursor:pointer; font-size:11px;">Logout</button>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <h2 style="margin:0;">6 LUCKY BALLS</h2>
            <div class="lucky-row" id="winning-nums-display"></div>
            <h1 id="result-title" style="font-size: 30px; margin: 5px 0;">--</h1>
            <p id="result-msg" style="font-weight:bold;"></p>
            <p id="all-winners" style="font-size:12px; margin-top:5px;"></p>
            <button onclick="closeResult()" class="btn-main" style="background:black; color:white;">Start Next Round</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvM9pcjS6K60tdA_xVlzVCTt7eZPQzEsw",
            authDomain: "t9glow-6badf.firebaseapp.com",
            projectId: "t9glow-6badf",
            storageBucket: "t9glow-6badf.firebasestorage.app",
            messagingSenderId: "607215632215",
            appId: "1:607215632215:web:d88b169eaa59a57644c812"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const socket = io();
        let selectedNums = [];
        let wallet = 1000;
        let myName = "";

        window.googleLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);
        window.closeResult = () => document.getElementById('result-overlay').style.display = 'none';

        // 🎰 1-25 Grid with Multi-Select Logic
        const grid = document.getElementById('numbers-grid');
        for(let i=1; i<=25; i++){
            const b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = i;
            b.onclick = () => {
                if(selectedNums.includes(i)) {
                    selectedNums = selectedNums.filter(n => n !== i);
                    b.classList.remove('selected');
                } else {
                    if(selectedNums.length < 6) {
                        selectedNums.push(i);
                        b.classList.add('selected');
                    } else {
                        alert("Bhai, sirf 6 numbers hi chun sakte ho!");
                    }
                }
                // Send current picks to server
                if(selectedNums.length === 6) {
                    socket.emit('placeBet', { name: myName, numbers: selectedNums });
                }
            };
            grid.appendChild(b);
        }

        socket.on('playerCount', count => document.getElementById('online-count').innerText = count);
        socket.on('updateLiveBets', count => document.getElementById('bet-count').innerText = count);

        socket.on('timer', (sec) => {
            document.getElementById('timer').innerText = `00:${sec.toString().padStart(2,'0')}`;
            if(sec <= 10) {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = true);
                document.getElementById('status').innerText = "🔒 Time Up! Calculating...";
            } else {
                document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = false);
                document.getElementById('status').innerText = `Picks: ${selectedNums.length}/6`;
            }
        });

        socket.on('gameResult', (data) => {
            const overlay = document.getElementById('result-overlay');
            const numsDisp = document.getElementById('winning-nums-display');
            overlay.style.display = 'flex';
            numsDisp.innerHTML = "";

            data.winningNumbers.forEach(n => {
                numsDisp.innerHTML += `<div class="lucky-ball">${n}</div>`;
            });

            if(data.winners.length > 0) {
                document.getElementById('top-winner-announcement').style.display = 'block';
                document.getElementById('last-winner-name').innerText = data.winners[0].split(' ')[0] + (data.winners.length > 1 ? ` & ${data.winners.length-1} more` : "");
                document.getElementById('all-winners').innerText = "Champions: " + data.winners.join(", ");
            }

            // Check if player's any pick matched
            const isWinner = selectedNums.some(num => data.winningNumbers.includes(num));

            if(selectedNums.length === 6 && isWinner) {
                document.getElementById('result-title').innerText = "🏆 JACKPOT!";
                document.getElementById('result-msg').innerText = "One of your picks matched! +500 Coins";
                wallet += 500;
                document.getElementById('wallet-balance').innerText = wallet;
            } else {
                document.getElementById('result-title').innerText = "💔 NO MATCH";
                document.getElementById('result-msg').innerText = "Better luck next time, Bhai!";
            }
            
            selectedNums = [];
            document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('selected'));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                myName = user.displayName;
            } else {
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('game-container').classList.add('hidden');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>9t9glow - Multiplayer Jackpot</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #0f0c29; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .nav { background: rgba(255,255,255,0.1); padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid orange; }
        .timer { font-size: 80px; font-weight: bold; color: orange; margin: 30px; text-shadow: 0 0 20px rgba(255,165,0,0.5); }
        .card { background: #1a1a2e; padding: 30px; border-radius: 20px; display: inline-block; border: 1px solid #333; }
        input { background: #0b0e14; border: 2px solid orange; color: white; padding: 15px; border-radius: 10px; width: 100px; font-size: 24px; text-align: center; }
        button { background: orange; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 20px; color: #00d2ff; }
    </style>
</head>
<body>

<div class="nav">
    <div id="display-name" style="font-weight: bold;">👤 Loading...</div>
    <div style="font-size: 20px;">💰 Coins: <span id="balance">0</span></div>
</div>

<div class="timer" id="timer-text">05:00</div>

<div class="card">
    <h2>Guess & Win (1-100)</h2>
    <input type="number" id="betNum" min="1" max="100" placeholder="00"> <br>
    <button onclick="confirmBet()" id="betBtn">Confirm Bet (10 Coins)</button>
    <div id="status">Connecting to Server...</div>
</div>

<script>
    const socket = io();
    let myGuess = null;
    let myName = "";

    // 1. Login Logic (Database se coins uthayega)
    window.onload = () => {
        let name = prompt("Apna Naam ya Number likho:", "Gaurav");
        if(!name) name = "User_" + Math.floor(Math.random()*99);
        myName = name;
        document.getElementById('display-name').innerText = "👤 " + myName;
        socket.emit('login', { name: myName });
    };

    // 2. Balance Update (Server se aayega)
    socket.on('update_balance', (coins) => {
        document.getElementById('balance').innerText = coins;
        document.getElementById('status').innerText = "Hello " + myName + "! Balance Updated.";
    });

    // 3. Timer Logic
    socket.on('tick', (s) => {
        let m = Math.floor(s / 60);
        let sec = s % 60;
        document.getElementById('timer-text').innerText = 
            (m < 10 ? "0"+m : m) + ":" + (sec < 10 ? "0"+sec : sec);
        
        if(s === 299) { // Naya round shuru
            document.getElementById('betBtn').disabled = false;
            myGuess = null;
        }
    });

    function confirmBet() {
        const val = document.getElementById('betNum').value;
        const currentBalance = parseInt(document.getElementById('balance').innerText);

        if(!val || val < 1 || val > 100) return alert("1-100 ke beech chuno!");
        if(currentBalance < 10) return alert("Paise khatam! Recharge karo.");
        
        myGuess = parseInt(val);
        document.getElementById('betBtn').disabled = true;
        document.getElementById('status').innerText = "✅ Bet on " + val + " (Waiting for result...)";
        
        // Server ko bet bhejo
        socket.emit('place_bet', { guess: myGuess });
    }

    // 4. Result Logic
    socket.on('round_ended', (data) => {
        if(myGuess !== null) {
            if(myGuess === data.winNum) {
                confetti();
                alert("MUBARAK HO! Jeet gaye. Winning number: " + data.winNum);
            } else {
                alert("Oho! Haar gaye. Winning number: " + data.winNum);
            }
        }
    });
</script>
</body>
</html>
